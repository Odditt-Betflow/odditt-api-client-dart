analyzer:
  language:
    strict-inference: true
    strict-raw-types: true
    strict-casts: false
  exclude:
    - test/*.dart
  errors:
    deprecated_member_use_from_same_package: ignore
    # lib/ is fully generated by openapi-generator (dart-dio) and never
    # hand-edited. The generator emits harmless duplicate/unused imports; don't
    # fail the build on them.
    duplicate_import: ignore
    unused_import: ignore
